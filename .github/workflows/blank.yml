name: Daily Quote

on:
  schedule:
    - cron: '0 05 * * *'
  workflow_dispatch:

# Least privilege: contents:write only because the job commits the quote to README.
permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs so a re-pointed tag can't inject code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Fetch quote and commit
        run: |
          git config user.name "myendmess"
          git config user.email "140411362+myendmess@users.noreply.github.com"

          # -f fails on HTTP errors; retries + timeout so a flaky API can't hang the job.
          RESPONSE=$(curl -fsS --retry 3 --retry-delay 5 --max-time 20 "https://zenquotes.io/api/random")
          # jq -e fails the step on null/missing fields — no more "null" commits.
          QUOTE=$(printf '%s' "$RESPONSE" | jq -er '.[0].q')
          AUTHOR=$(printf '%s' "$RESPONSE" | jq -er '.[0].a')

          # The API response is untrusted input that lands in README (rendered
          # markdown), a commit message, and a YouTube title. Strip angle
          # brackets/backticks/control chars and cap length before it goes anywhere.
          sanitize() { printf '%s' "$1" | tr -d '<>`' | tr -d '\000-\037\177'; }
          QUOTE=$(sanitize "$QUOTE" | cut -c1-300)
          AUTHOR=$(sanitize "$AUTHOR" | cut -c1-100)
          if [ -z "$QUOTE" ] || [ -z "$AUTHOR" ]; then
            echo "::error::Quote API returned empty/invalid content"
            exit 1
          fi
          DATE=$(date -u '+%Y-%m-%d')

          # Save the raw quote/author so the video steps use the same quote.
          printf '%s' "$QUOTE" > quote.txt
          printf '%s' "$AUTHOR" > author.txt

          # Build the new entry and insert it ABOVE the most recent one
          ENTRY_FILE=$(mktemp)
          printf "## %s\n\n> %s\n\n— %s\n\n" "$DATE" "$QUOTE" "$AUTHOR" > "$ENTRY_FILE"

          awk -v ef="$ENTRY_FILE" '
            !ins && /^## / {
              while ((getline line < ef) > 0) print line
              ins=1
            }
            { print }
            END { if (!ins) while ((getline line < ef) > 0) print line }
          ' README.md > README.tmp
          mv README.tmp README.md

          git add README.md
          git commit -m "$DATE: \"$QUOTE\" — $AUTHOR"
          git pull --rebase origin main
          git push

      - name: Check YouTube secrets
        id: yt
        env:
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          if [ -n "$YT_REFRESH_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::YouTube secrets not set — skipping video."
          fi

      - name: Render video
        if: steps.yt.outputs.ready == 'true'
        run: bash scripts/make_video.sh

      - name: Set up Python
        if: steps.yt.outputs.ready == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      # Optional: translate the quote for the markets enabled in locales.json.
      # Skips itself (without failing the run) when TRANSLATE_API_KEY is unset.
      - name: Localize metadata for target markets
        if: steps.yt.outputs.ready == 'true'
        env:
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
        run: python scripts/localize.py

      - name: Upload to YouTube playlist
        if: steps.yt.outputs.ready == 'true'
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PLAYLIST_ID: ${{ secrets.YT_PLAYLIST_ID }}
        run: |
          # Pinned so a compromised/broken new release can't slide into the daily run.
          pip install --quiet \
            google-api-python-client==2.198.0 \
            google-auth==2.55.2 \
            google-auth-httplib2==0.4.0
          python scripts/upload_youtube.py
