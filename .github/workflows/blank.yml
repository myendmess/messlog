name: Daily Commit

on:
  schedule:
    - cron: '0 05 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Daily motivational commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RESPONSE=$(curl -s "https://zenquotes.io/api/random")
          QUOTE=$(echo "$RESPONSE" | jq -r '.[0].q')
          AUTHOR=$(echo "$RESPONSE" | jq -r '.[0].a')
          DATE=$(date -u '+%Y-%m-%d')

          printf "\n## %s\n\n> %s\n\n— %s\n" "$DATE" "$QUOTE" "$AUTHOR" >> README.md

          git add README.md
          git commit -m "$DATE: \"$QUOTE\" — $AUTHOR"
          git pull --rebase origin main
          git push
