name: Daily Quote

on:
  schedule:
    - cron: '0 05 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render only: no README commit, no YouTube upload; out.mp4 saved as a run artifact for preview"
        type: boolean
        default: false

# Least privilege: contents:write only because the job commits the quote to README.
permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs so a re-pointed tag can't inject code.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Pick quote and commit
        env:
          DRY_RUN: ${{ inputs.dry_run == true }}
        run: |
          git config user.name "myendmess"
          git config user.email "140411362+myendmess@users.noreply.github.com"

          # No remote quote API anymore: the curated, pre-translated bank in
          # quotes.json is the source. pick_quote.py sanitizes and writes
          # quote.txt / author.txt / localized.json deterministically by date.
          python3 scripts/pick_quote.py

          QUOTE=$(cat quote.txt)
          AUTHOR=$(cat author.txt)
          if [ -z "$QUOTE" ] || [ -z "$AUTHOR" ]; then
            echo "::error::pick_quote.py produced empty quote/author"
            exit 1
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — skipping README commit."
            exit 0
          fi
          DATE=$(date -u '+%Y-%m-%d')

          # Build the new entry and insert it ABOVE the most recent one
          ENTRY_FILE=$(mktemp)
          printf "## %s\n\n> %s\n\n— %s\n\n" "$DATE" "$QUOTE" "$AUTHOR" > "$ENTRY_FILE"

          awk -v ef="$ENTRY_FILE" '
            !ins && /^## / {
              while ((getline line < ef) > 0) print line
              ins=1
            }
            { print }
            END { if (!ins) while ((getline line < ef) > 0) print line }
          ' README.md > README.tmp
          mv README.tmp README.md

          git add README.md
          git commit -m "$DATE: \"$QUOTE\" — $AUTHOR"
          git pull --rebase origin main
          git push

      - name: Check YouTube secrets
        id: yt
        env:
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          if [ -n "$YT_REFRESH_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::YouTube secrets not set — skipping video."
          fi

      - name: Render video
        if: steps.yt.outputs.ready == 'true' || inputs.dry_run == true
        run: bash scripts/make_video.sh

      # Dry run: publish nothing — attach the render to the run for preview.
      - name: Upload render as artifact (dry run)
        if: inputs.dry_run == true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: short-preview
          path: out.mp4
          retention-days: 3

      - name: Set up Python
        if: steps.yt.outputs.ready == 'true' && inputs.dry_run != true
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Upload to YouTube playlist
        if: steps.yt.outputs.ready == 'true' && inputs.dry_run != true
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PLAYLIST_ID: ${{ secrets.YT_PLAYLIST_ID }}
        run: |
          # Pinned so a compromised/broken new release can't slide into the daily run.
          pip install --quiet \
            google-api-python-client==2.198.0 \
            google-auth==2.55.2 \
            google-auth-httplib2==0.4.0
          python scripts/upload_youtube.py
